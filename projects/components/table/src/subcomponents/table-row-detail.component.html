<!--
zv-iframe autoheight funktioniert nur, wenn das iframe beim Initialisieren sichtbar ist.
Deshalb sorgen wir hier mit @if dafür, das es erst beim Aufklappen initialisiert wird.
-->
<div class="zv-table-row-detail__content">
  @if (renderContent()) {
    <ng-template [ngTemplateOutlet]="rowDetail()!.template()" [ngTemplateOutletContext]="{ $implicit: element() }" />
  }
</div>
